# ═══════════════════════════════════════════════════════════
# VegaMCP Command Centre — Nginx Production Routing
# ═══════════════════════════════════════════════════════════
# Routing: command.vegatech.online -> Local VegaMCP Ports

server {
    listen 80;
    listen [::]:80;
    server_name vega.vegatech.online claw.vegatech.online;

    # ─── SSL Initialization (Certbot will update this) ───
    # listen 443 ssl http2;
    # ssl_certificate /etc/letsencrypt/live/vega.vegatech.online/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/vega.vegatech.online/privkey.pem;

    # ─── Dashboard Frontend (Static HTML) ───
    location / {
        root /var/www/vegaclaw;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ─── Control Bridge API (Port 42019) ───
    # Requests from App.tsx go to BRIDGE endpoint. 
    # In production, we route these through /bridge path to keep it on one domain.
    location /bridge/ {
        rewrite ^/bridge/(.*) /$1 break;
        proxy_pass http://127.0.0.1:42019;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable buffering for vision/streaming
        proxy_buffering off;
        proxy_cache off;
    }

    # ─── Vision Stream (Port 4280) ───
    location /api/stream {
        proxy_pass http://127.0.0.1:4280/api/stream;
        proxy_http_version 1.1;
        proxy_set_header Connection "keep-alive";
        proxy_buffering off;
        proxy_cache off;
    }

    # ─── Headless IDE (Code-Server Port 8080 or custom) ───
    # Route via /ide/ path to avoid separate subdomains for agents
    location /ide/ {
        proxy_pass http://127.0.0.1:8080/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name vegatech.online;

    location / {
        proxy_pass http://127.0.0.1:5173; # Assuming VegaTech runs on standard local Vite port
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
