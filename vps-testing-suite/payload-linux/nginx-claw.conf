# ═══════════════════════════════════════════════════════════
# VegaClaw — Production Nginx Reverse Proxy
# ═══════════════════════════════════════════════════════════
# Place at: /etc/nginx/sites-available/claw
# Symlink:  ln -sf /etc/nginx/sites-available/claw /etc/nginx/sites-enabled/
#
# Performance targets: <50ms TTFB, <200ms full page load
# Comparable to: Vercel Edge, Cloudflare Workers, Netlify CDN

upstream claw_backend {
    server 127.0.0.1:4280;
    keepalive 64;                     # Persistent connections to upstream
    keepalive_requests 10000;         # Max requests per connection
    keepalive_timeout 120s;           # Match Node.js keepAliveTimeout
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # ─── Security Headers ───
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ─── Gzip (for browsers that bypass pre-compressed) ───
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ─── Client Body ───
    client_max_body_size 10m;
    client_body_buffer_size 128k;
    client_header_buffer_size 4k;

    # ─── Connection Tuning ───
    keepalive_timeout 120s;
    keepalive_requests 10000;
    send_timeout 60s;
    proxy_connect_timeout 10s;
    proxy_read_timeout 300s;          # 5min for long AI/vision requests
    proxy_send_timeout 60s;

    # ─── Proxy Cache (optional: cache API responses briefly) ───
    # proxy_cache_path /tmp/nginx-cache levels=1:2 keys_zone=claw:10m max_size=100m inactive=5m;

    # ─── Static HTML (served directly by nginx for max speed) ───
    location = / {
        proxy_pass http://claw_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Micro-cache the HTML for 5s to handle burst traffic
        proxy_cache_valid 200 5s;
        expires 5s;
    }

    # ─── API — No Caching, Full Proxy ───
    location /api/ {
        proxy_pass http://claw_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # No caching for API
        proxy_cache off;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;

        # Streaming support for SSE/long-poll
        proxy_buffering off;
        proxy_set_header X-Accel-Buffering no;
    }

    # ─── Rate Limiting (DDoS protection) ───
    # Uncomment and add the following to http {} block in /etc/nginx/nginx.conf:
    # limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    #
    # Then use here:
    # location /api/ {
    #     limit_req zone=api burst=50 nodelay;
    #     ...
    # }

    # ─── Block common attack paths ───
    location ~ /\.(env|git|ssh|htaccess|htpasswd) {
        deny all;
        return 404;
    }

    # ─── Deny access to backup/temp files ───
    location ~ ~$ { deny all; }
    location ~ \.bak$ { deny all; }
}
